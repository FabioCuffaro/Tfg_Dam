<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Red Social TFG</title>
  <link rel="stylesheet" href="css/login_register.css">
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>Crear una cuenta</h1>
      <p class="subtitle">Únete a nuestra red social</p>

      <form id="registerForm">

        <div class="form-group">
          <label for="username">Nombre de usuario</label>
          <input type="text" id="username" name="username" required 
                 placeholder="juanperez" 
                 pattern="^[a-zA-Z0-9_]{3,20}$"
                 title="3-20 caracteres: letras, números y guion bajo">
          <small class="form-hint">Solo letras, números y guion bajo (3-20 caracteres)</small>
        </div>

        <div class="form-group">
          <label for="displayName">Nombre completo</label>
          <input type="text" id="displayName" name="displayName" required placeholder="Juan Pérez" maxlength="100">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="tu@email.com">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required placeholder="••••••">
          <small class="form-hint">Mínimo 6 caracteres</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" name="confirmPassword" 
                 required placeholder="••••••">
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <button type="submit" class="btn-primary" id="registerBtn">
          <span class="btn-text">Crear Cuenta</span>
          <span class="btn-loader" style="display: none;">⏳</span>
        </button>

      </form>

      <p class="link">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </p>

    </div>

  </div>

  <script src="js/register.js"></script>
  
</body>
</html>
